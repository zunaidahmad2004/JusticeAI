services:
  # ─── Single Unified Service (Backend + Frontend) ──────────────────────────────
  # Backend serves API at /api/* AND frontend static files at /*
  # This eliminates all SPA routing issues — no separate static site needed
  - type: web
    name: justiceai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && node build.mjs
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CREDENTIALS_B64
        sync: false
      - key: CLIENT_URL
        value: https://justiceai-backend.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads
      - key: NODE_VERSION
        value: 20.18.0
    healthCheckPath: /api/health
    autoDeploy: true

  # ─── Frontend Standalone Web Service ─────────────────────────────────────────
  - type: web
    name: justiceai-frontend
    runtime: node
    rootDir: client
    buildCommand: echo "pre-built"
    startCommand: node server.mjs
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20.18.0
    autoDeploy: true

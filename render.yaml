services:
  # ─── Backend ─────────────────────────────────────────────────────────────────
  - type: web
    name: justiceai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && node build.mjs
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 52428800
    healthCheckPath: /api/health
    autoDeploy: true

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: justiceai-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install --also=dev && NODE_OPTIONS=--max-old-space-size=1536 npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    autoDeploy: true

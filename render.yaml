services:
  # Backend Web Service
  - type: web
    name: justiceai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && node build.mjs
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: NODE_VERSION
        value: 20.18.0
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Static Site - pre-built dist committed to repo
  - type: web
    name: justiceai-frontend
    runtime: static
    buildCommand: echo "pre-built"
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://justiceai-rgpg.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    autoDeploy: true

services:
  # ─── Backend Web Service ──────────────────────────────────────────────────────
  - type: web
    name: justiceai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && node build.mjs
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://justiceai-frontend.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads
      - key: NODE_VERSION
        value: 20.18.0
    healthCheckPath: /api/health
    autoDeploy: true

  # ─── Frontend Node.js Web Service ─────────────────────────────────────────────
  # Uses pre-built dist/ committed to repo
  # server.mjs handles SPA routing — ALL paths return index.html
  - type: web
    name: justiceai-frontend
    runtime: node
    rootDir: client
    buildCommand: echo "dist already committed to repo"
    startCommand: node server.mjs
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20.18.0
    autoDeploy: true
